            --neon-glow: rgba(56, 189, 248, 0.4);

            --glass-bg-hover: rgba(24, 24, 27, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; position: relative; overflow-x: hidden; background-color: #000; }

        /* ----- PANTALLA DE CARGA ----- */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s ease; }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--glass-border); border-top-color: var(--neon-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ----- CONTENEDOR DE BOTONES SUPERIORES ----- */
        .top-buttons-container { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 10;}
        
        .top-btn { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); color: var(--text-main); padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 14px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center;}
        .top-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); border: 1px solid rgba(255, 255, 255, 0.3); }
        
        #music-toggle { position: absolute; top: 20px; left: 20px; gap: 6px; z-index: 10;}

        /* ----- MENSAJE FLOTANTE (TOAST) ----- */
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 100px); background: var(--neon-color); color: #000; padding: 12px 24px; border-radius: 30px; font-weight: 700; font-size: 14px; opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 1000; box-shadow: 0 10px 20px var(--neon-glow); pointer-events: none; }
        #toast.show { transform: translate(-50%, 0); opacity: 1; }

        /* ----- FONDO Y PARTÍCULAS ----- */
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; object-fit: cover; }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: rgba(9, 9, 11, 0.4); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
        #particles-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; transition: opacity 0.5s ease;}
        .particle { position: absolute; bottom: -10px; width: 3px; height: 3px; background: var(--neon-color); border-radius: 50%; box-shadow: 0 0 8px var(--neon-color); opacity: 0; animation: floatUp linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 0.8; } 100% { transform: translateY(-100vh); opacity: 0; } }

        /* ----- CONTENEDOR PRINCIPAL ----- */
        .container { width: 100%; max-width: 500px; padding: 80px 20px 50px 20px; z-index: 1; display: flex; flex-direction: column; align-items: center; }

        /* ----- PERFIL ----- */
        .profile { text-align: center; margin-bottom: 40px; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; }
        .name-container { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px; }
        .profile img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 2px solid var(--glass-border); box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5); transform-style: preserve-3d; cursor: pointer; }
        h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
        .verified-badge { width: 20px; height: 20px; color: var(--neon-color); }
        .bio { color: var(--text-muted); font-size: 15px; font-weight: 400; }

        /* ----- ENLACES PRINCIPALES ----- */
        .links { width: 100%; display: flex; flex-direction: column; gap: 16px; }
        .link-card { display: flex; align-items: center; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 18px 20px; text-decoration: none; color: var(--text-main); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both; transform-style: preserve-3d; cursor: pointer; }
        
        .link-card:nth-child(1) { animation-delay: 0.1s; } .link-card:nth-child(2) { animation-delay: 0.2s; }
        .link-card:nth-child(3) { animation-delay: 0.3s; } .link-card:nth-child(4) { animation-delay: 0.4s; }
        .link-card:nth-child(5) { animation-delay: 0.5s; }

        .link-card:hover { background: var(--glass-bg-hover); border: 1px solid var(--neon-color); box-shadow: 0 10px 30px var(--neon-glow); }
        
        .icon { display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; margin-right: 16px; transform: translateZ(20px); }
        .icon svg { width: 22px; height: 22px; fill: currentColor; }
        .link-title { font-size: 15px; font-weight: 600; flex-grow: 1; transform: translateZ(20px); text-align: left; }

        .link-card:hover .link-arrow { color: var(--neon-color); transform: translateX(4px) translateZ(20px); }

        /* ----- REDES SOCIALES PEQUEÑAS ----- */
        .social-row { display: flex; justify-content: center; gap: 20px; margin-top: 40px; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both; animation-delay: 0.6s; }

    </style>

        const musicAudio = document.getElementById('bg-music');
        
        function playRandomSong() {
            const randomSong = songs[Math.floor(Math.random() * songs.length)];
            musicAudio.src = randomSong;
            musicAudio.play();
        }

        musicAudio.addEventListener('ended', playRandomSong);

        const musicBtn = document.getElementById('music-toggle');
        const musicIcon = document.getElementById('music-icon');
        const tMusic = document.getElementById('t-music');

        function toggleMusic() {
            if (musicAudio.paused) {
                if (!musicAudio.src || musicAudio.src === window.location.href) {
                    playRandomSong();
                } else {
                    musicAudio.play();
                }
                musicIcon.innerText = "⏸";
                tMusic.innerText = translations[currentLang].musicPause;
            } else {
                musicAudio.pause();
                musicIcon.innerText = "🎵";
                tMusic.innerText = translations[currentLang].musicPlay;

        let hasInteracted = false;
        function startMusicAutomatically() {
            if (!hasInteracted && musicAudio.paused) {
                toggleMusic();
                hasInteracted = true;
            }
        }
        document.body.addEventListener('click', startMusicAutomatically, { once: true });
        document.body.addEventListener('touchstart', startMusicAutomatically, { once: true });

        // --- 3. SISTEMA DE IDIOMAS ---
        const translations = {
            en: {
                bio: "Shops & Connections", discord: "Add me on Discord", paypal: "Support on PayPal",
                kofi: "Buy me a Ko-fi", patreon: "Patreon Shop", email: "Copy my Email",
                toast: "Copied to clipboard!", musicPlay: "Play", musicPause: "Pause"
            },
            es: {
                bio: "Tiendas y Conexiones", discord: "Añádeme en Discord", paypal: "Apoyar en PayPal",
                kofi: "Invítame un Ko-fi", patreon: "Tienda de Patreon", email: "Copiar mi Correo",
                toast: "¡Copiado al portapapeles!", musicPlay: "Play", musicPause: "Pausa"
            }
        };

        let currentLang = 'en';

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('t-bio').innerText = translations[lang].bio;
            document.getElementById('t-discord').innerText = translations[lang].discord;
            document.getElementById('t-paypal').innerText = translations[lang].paypal;
            document.getElementById('t-kofi').innerText = translations[lang].kofi;
            document.getElementById('t-patreon').innerText = translations[lang].patreon;
            document.getElementById('t-email').innerText = translations[lang].email;
            document.getElementById('toast').innerText = translations[lang].toast;
            document.getElementById('lang-toggle').innerText = lang === 'en' ? 'ES' : 'EN';
            document.getElementById('t-music').innerText = musicAudio.paused ? translations[lang].musicPlay : translations[lang].musicPause;
        }

        window.onload = () => {
            const userLang = navigator.language || navigator.userLanguage; 
            if (userLang.toLowerCase().startsWith('es')) { setLanguage('es'); } else { setLanguage('en'); }
            createParticles();
        };

        document.getElementById('lang-toggle').addEventListener('click', () => {
            setLanguage(currentLang === 'en' ? 'es' : 'en');
        });

        // --- 4. COPIAR CORREO ---
        function copyEmail() {
            navigator.clipboard.writeText("alejandrosalaza0.7@gmail.com").then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            });
        }

        // --- 5. PARTÍCULAS ---
        let particlesEnabled = true;
        
        function createParticles() {
            const container = document.getElementById('particles-container');
            container.innerHTML = ''; // Limpia las anteriores
            const particleCount = 35; // Bajé un poco la cantidad para optimizar
            for (let i = 0; i < particleCount; i++) {
                let particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDuration = (Math.random() * 10 + 5) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }

        // Botón de encender/apagar partículas
        const particlesBtn = document.getElementById('particles-toggle');
        particlesBtn.addEventListener('click', () => {
            const container = document.getElementById('particles-container');
            if (particlesEnabled) {
                container.style.opacity = '0';
                setTimeout(() => container.innerHTML = '', 500); // Las borra después de ocultarlas
                particlesBtn.style.opacity = '0.5'; // El botón se pone opaco
                particlesEnabled = false;
            } else {
                createParticles();
                container.style.opacity = '1';
                particlesBtn.style.opacity = '1';
                particlesEnabled = true;
            }
        });
    </script>
</body>
</html>
